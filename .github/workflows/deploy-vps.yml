name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Deploy to VPS via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          FTP_HOST: kehinde.vudse26.cloud
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          remote-dir: public_html/
          protocol: ftp
          excludes: |
            .git/
            .github/
            node_modules/
            test/
            .dockerignore
            .eslintrc.js
            jest.config.js
            .gitignore
            #dfdfdfd
            
